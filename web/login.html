<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="login-box">

        <h1>Bem Vindo</h1>

        <input
            type="email"
            id="email"
            placeholder="E-Mail"
        >

        <input
            type="password"
            id="senha"
            placeholder="Senha"
        >

        <button onclick="login()">
            ENTRAR
        </button>

    </div>

    <script src="script.js"></script>

</body>
</html>
